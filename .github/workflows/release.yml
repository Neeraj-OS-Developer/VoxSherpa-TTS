name: Build & Attach Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;25.2.9519653"

      - name: Grant execute permission
        run: chmod +x gradlew

      # Is step mein humne Gradle ko 4GB RAM allocate ki hai taaki OOM crash na ho
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      # Ye step ab saare ABI split APKs ko dhundh kar rename karega
      - name: Rename APK
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="run-${{ github.run_number }}"
          fi
          for apk in app/build/outputs/apk/debug/*.apk; do
            filename=$(basename "$apk")
            mv "$apk" "VoxSherpa-TTS-${VERSION}-${filename}"
          done

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: VoxSherpa-TTS-*-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
