name: Build & Attach Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;25.2.9519653"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Rename APK
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="run-${{ github.run_number }}"
          fi
          for apk in app/build/outputs/apk/debug/*.apk; do
            filename=$(basename "$apk")
            mv "$apk" "VoxSherpa-TTS-${VERSION}-${filename}"
          done

      # Naya Step: Release ki jagah Artifact mein upload karega
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxSherpa-Debug-APKs
          path: VoxSherpa-TTS-*-debug.apk
