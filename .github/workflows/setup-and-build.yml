name: Setup + Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle
        run: sudo apt-get update && sudo apt-get install -y gradle

      # 🔥 Wrapper generate karega (main missing part)
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.13

      # 🔥 permission fix
      - name: Grant execute permission
        run: chmod +x gradlew

      # 🔥 Build APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 🔥 APK upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      # 🔥 Wrapper repo me save karega
      - name: Commit Wrapper
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add gradlew gradlew.bat gradle/
          git commit -m "Add Gradle Wrapper" || echo "No changes"
          git push
